theme = "dracula"
icons = "awesome"

[[block]]
block = "sound"
step_width = 3

[[block]]
block = "disk_space"
path = "/"
alias = "/"
info_type = "available"
unit = "GB"
interval = 20
warning = 20.0
alert = 10.0
[block.theme_overrides]
idle_bg = "#B20000" 

[[block]]
block = "time"
interval = 5
format = "%a %d.%m %R"
[block.theme_overrides]
idle_bg = "#4682B4"

[[block]]
block = "backlight"
[block.theme_overrides]
idle_bg = "#FFFF00"
idle_fg = "#000000"

[[block]]
block = "battery"
if_command = "test -e /sys/class/power_supply/BAT0"
